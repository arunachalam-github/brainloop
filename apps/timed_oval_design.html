<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brainloop — Timed Oval Design</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f5f0e8;
  color: #555;
  font-family: 'Georgia', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 64px;
}
h1 { font-size: 15px; color: #666; font-weight: 400; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
.subtitle { font-size: 11px; color: #aaa; margin-bottom: 32px; letter-spacing: 0.5px; }
#legend {
  display: flex; gap: 28px; margin-bottom: 40px;
  font-size: 11px; font-family: 'SF Mono', monospace; color: #999;
}
.leg { display: flex; align-items: center; gap: 8px; }
.leg-block {
  width: 28px; height: 18px; border-radius: 2px; display: inline-block;
}
#chart-wrap { width: 100%; max-width: 960px; position: relative; }
canvas { display: block; width: 100%; cursor: crosshair; }
#tooltip {
  position: fixed; pointer-events: none; display: none;
  background: rgba(30,25,18,0.92); border-radius: 5px; padding: 8px 12px;
  font-size: 11px; color: #ddd; z-index: 10;
  font-family: 'SF Mono', monospace;
  box-shadow: 0 3px 14px rgba(0,0,0,0.25);
  line-height: 1.7;
}
.tt-time  { color: #999; font-size: 10px; }
.tt-state { font-size: 12px; font-weight: 600; color: #fff; }
.tt-count { color: #aaa; }
.tt-apps  { color: #bbb; font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>
<h1>Context Switch Blocks — Today (05:13 – now)</h1>
<div class="subtitle">15-minute buckets &nbsp;·&nbsp; Oval count &amp; spin speed scale with switches &nbsp;·&nbsp; 154 real switches</div>
<div id="legend">
  <div class="leg">
    <span class="leg-block" style="background:rgba(42,34,24,0.30)"></span>
    Calm
  </div>
  <div class="leg">
    <span class="leg-block" style="background:rgba(42,34,24,0.60)"></span>
    Busy
  </div>
  <div class="leg">
    <span class="leg-block" style="background:rgba(42,34,24,0.88)"></span>
    Chaotic
  </div>
</div>
<div id="chart-wrap"><canvas id="c"></canvas></div>
<div id="tooltip"></div>

<script>
const DATA = {"buckets": [{"idx": 0, "count": 5, "apps": ["Google Chrome", "Slack", "SecurityAgent"]}, {"idx": 1, "count": 18, "apps": ["Claude", "Code", "Google Chrome"]}, {"idx": 2, "count": 26, "apps": ["Claude", "Code", "Google Chrome", "Slack"]}, {"idx": 3, "count": 9, "apps": ["Code", "Google Chrome"]}, {"idx": 4, "count": 23, "apps": ["Claude", "Code", "Google Chrome"]}, {"idx": 5, "count": 39, "apps": ["Claude", "Code", "Google Chrome", "Slack", "System Settings"]}, {"idx": 6, "count": 2, "apps": ["Claude", "Google Chrome"]}, {"idx": 7, "count": 32, "apps": ["Claude", "Code", "Google Chrome", "Slack", "Okta Verify", "coreautha"]}], "labels": [{"label": "05:13", "idx_f": 0.0}, {"label": "05:28", "idx_f": 1.0}, {"label": "05:43", "idx_f": 2.0}, {"label": "05:58", "idx_f": 3.0}, {"label": "06:13", "idx_f": 4.0}, {"label": "06:28", "idx_f": 5.0}, {"label": "06:43", "idx_f": 6.0}, {"label": "06:58", "idx_f": 7.0}], "total": 154, "window_start_ms": 1776296628391, "bucket_secs": 900};

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const tip    = document.getElementById('tooltip');

// ── Constants ──────────────────────────────────────────────────────────────────
const PAD_L  = 0;
const PAD_R  = 0;
const PAD_T  = 8;
const PAD_B  = 32;   // room for time labels below
const GAP    = 4;    // px between blocks
const BG     = '#f5f0e8';
const OVAL_COLOR = '#f5f0e8';  // light ovals on dark block

// ── Thresholds (fixed absolute) ───────────────────────────────────────────────
const T_CALM = 10;   // < 10 switches → calm
const T_BUSY = 25;   // 10–25 → busy, > 25 → chaotic

function stateOf(count) {
  if (count === 0)     return 'empty';
  if (count < T_CALM)  return 'calm';
  if (count <= T_BUSY) return 'busy';
  return 'chaotic';
}

function blockFill(state) {
  switch (state) {
    case 'empty':   return 'rgba(42,34,24,0.07)';
    case 'calm':    return 'rgba(42,34,24,0.30)';
    case 'busy':    return 'rgba(42,34,24,0.60)';
    case 'chaotic': return 'rgba(42,34,24,0.88)';
  }
}

// ── Seeded RNG ─────────────────────────────────────────────────────────────────
function makeRng(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 0xFFFFFFFF; };
}

// ── Block + oval descriptors (built once on resize) ───────────────────────────
let blocks = [];  // [{bx, by, bw, bh, state, b, ovals:[{ox,oy,rx,ry,tilt0,speed,phase,alpha,lw}]}]
let W = 0, H = 0;

function buildBlocks(w, h) {
  const plotW = w - PAD_L - PAD_R;
  const bh    = h - PAD_T - PAD_B;
  const bwFull = plotW / DATA.buckets.length;
  blocks = [];

  DATA.buckets.forEach((b, i) => {
    const rng   = makeRng(i * 137 + 53);
    const state = stateOf(b.count);

    const bx = PAD_L + i * bwFull;
    const by = PAD_T;
    const bw = bwFull - GAP;

    // Center of this block
    const cx = bx + bw / 2;
    const cy = by + bh / 2;

    // Oval count: 1 per 3 switches, minimum 0, no hard cap
    const n = Math.floor(b.count / 3);

    // Oval size: small fixed base
    const ovalRx = bw * 0.09;
    const ovalRy = bh * 0.09;

    // Max scatter radius: ovals start at center and spread outward as k increases.
    // Radius grows linearly with k so early ovals sit near center, later ones push out.
    const maxScatterX = bw * 0.38;
    const maxScatterY = bh * 0.38;

    const ovals = [];

    for (let k = 0; k < n; k++) {
      // Spread fraction: 0 at center → 1 at edge. First few ovals near center.
      const spread = n <= 1 ? 0 : k / (n - 1);

      // Random direction on a circle, then scale by spread
      const angle  = rng() * Math.PI * 2;
      const jitter = 0.4 + rng() * 0.6;   // 0.4–1.0 so it's not perfectly ring-shaped
      const ox = Math.cos(angle) * spread * maxScatterX * jitter;
      const oy = Math.sin(angle) * spread * maxScatterY * jitter;

      // Spin speed scales with state AND continuously with count
      const countNorm = Math.min(b.count / 40, 1);  // 0..1 across full range
      const baseSpeed = state === 'calm'    ? 0.08 + countNorm * 0.12 + rng() * 0.08
                      : state === 'busy'    ? 0.30 + countNorm * 0.40 + rng() * 0.20
                      : /* chaotic */         0.80 + countNorm * 1.20 + rng() * 0.60;
      const dir = k % 2 === 0 ? 1 : -1;

      ovals.push({
        ox, oy,
        rx: ovalRx * (0.65 + rng() * 0.50),
        ry: ovalRy * (0.55 + rng() * 0.45),
        tilt0: rng() * Math.PI * 2,
        speed: baseSpeed * dir,
        phase: rng() * Math.PI * 2,
        alpha: 0.50 + rng() * 0.35,
        lw:    0.8 + rng() * 0.7,
      });
    }

    blocks.push({ bx, by, bw, bh, cx, cy, state, b, ovals });
  });
}

// ── Draw one block + its ovals ─────────────────────────────────────────────────
function drawBlock(bo, t) {
  const { bx, by, bw, bh, cx, cy, state, ovals } = bo;

  ctx.save();

  // Clip to block rectangle (ovals won't overflow)
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 3);
  ctx.clip();

  // Fill block background
  ctx.fillStyle = blockFill(state);
  ctx.fillRect(bx, by, bw, bh);

  // Draw ovals inside
  ovals.forEach(ov => {
    const tilt = ov.tilt0 + ov.speed * t + ov.phase;
    ctx.save();
    ctx.globalAlpha = ov.alpha;
    ctx.strokeStyle = OVAL_COLOR;
    ctx.lineWidth   = ov.lw;
    ctx.lineJoin    = 'round';
    ctx.translate(cx + ov.ox, cy + ov.oy);
    ctx.rotate(tilt);
    ctx.beginPath();
    ctx.ellipse(0, 0, Math.max(ov.rx, 1), Math.max(ov.ry, 0.5), 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });

  ctx.restore();
}

// ── Draw time labels below blocks ─────────────────────────────────────────────
function drawLabels() {
  const bwFull = (W - PAD_L - PAD_R) / DATA.buckets.length;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.font = '10px SF Mono,monospace';
  ctx.textAlign = 'center';
  DATA.labels.forEach(l => {
    const x = PAD_L + (l.idx_f + 0.5) * bwFull;
    ctx.fillText(l.label, x, H - 8);
  });
  ctx.restore();
}

// ── Resize ─────────────────────────────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.parentElement.getBoundingClientRect().width;
  H = 180;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  buildBlocks(W, H);
}

// ── Animation loop ─────────────────────────────────────────────────────────────
let raf;
function animate(ts) {
  const t = ts / 1000;
  ctx.clearRect(0, 0, W, H);
  blocks.forEach(bo => drawBlock(bo, t));
  drawLabels();
  raf = requestAnimationFrame(animate);
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect  = canvas.getBoundingClientRect();
  const x     = e.clientX - rect.left;
  const bwFull = (W - PAD_L - PAD_R) / DATA.buckets.length;
  if (x < PAD_L || x > W - PAD_R) { tip.style.display = 'none'; return; }
  const idx = Math.min(DATA.buckets.length - 1, Math.floor((x - PAD_L) / bwFull));
  const b   = DATA.buckets[idx];
  const s   = stateOf(b.count);
  const tS  = new Date(DATA.window_start_ms + idx * DATA.bucket_secs * 1000);
  const tE  = new Date(DATA.window_start_ms + (idx + 1) * DATA.bucket_secs * 1000);
  const fmt = d => d.toTimeString().slice(0, 5);
  const stateLabel = s === 'empty' ? '— Empty' : s === 'calm' ? '😌 Calm' : s === 'busy' ? '⚡ Busy' : '🌀 Chaotic';
  tip.innerHTML = `
    <div class="tt-time">${fmt(tS)} – ${fmt(tE)}</div>
    <div class="tt-state">${stateLabel}</div>
    <div class="tt-count">${b.count} switches</div>
    ${b.apps.length ? `<div class="tt-apps">${b.apps.join(' · ')}</div>` : ''}
  `;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
});
canvas.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

window.addEventListener('resize', () => {
  cancelAnimationFrame(raf);
  resize();
  raf = requestAnimationFrame(animate);
});

resize();
raf = requestAnimationFrame(animate);
</script>
</body>
</html>
